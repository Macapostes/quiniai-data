name: Actualizar cuotas y enviar datos

on:
  schedule:
    # 2 ejecuciones diarias en UTC.
    # En horario de Madrid suelen caer por la mañana y por la tarde-noche.
    - cron: '0 8 * * *'   # 10:00 Madrid aprox. en verano
    - cron: '0 18 * * *'  # 20:00 Madrid aprox. en verano
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Descargar archivos del repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: python -m pip install --upgrade pip requests

      - name: Regenerar cuotas.json
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          if [ -z "${ODDS_API_KEY}" ]; then
            echo "Falta el secreto ODDS_API_KEY"
            exit 1
          fi
          python update_odds.py

      - name: Publicar cuotas.json actualizado
        run: |
          if git diff --quiet -- cuotas.json; then
            echo "cuotas.json sin cambios"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cuotas.json
          git commit -m "Actualizar cuotas"
          git push

      - name: Enviar snapshot a la IA
        env:
          QUINIAI_ADMIN_KEY: ${{ secrets.QUINIAI_ADMIN_KEY }}
          QUINIAI_BACKEND_URL: ${{ secrets.QUINIAI_BACKEND_URL }}
        run: |
          curl -X POST "${QUINIAI_BACKEND_URL}/admin/ia-feed" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${QUINIAI_ADMIN_KEY}" \
            -H "x-admin-key: ${QUINIAI_ADMIN_KEY}" \
            -d @cuotas.json
