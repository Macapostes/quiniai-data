name: Enviar Datos al Backend

on:
  schedule:
    # 4 ejecuciones diarias en UTC → horario Madrid (CEST verano = UTC+2)
    - cron: '0 0 * * *'   # 02:00 Madrid
    - cron: '0 8 * * *'   # 10:00 Madrid
    - cron: '0 13 * * *'  # 15:00 Madrid
    - cron: '0 18 * * *'  # 20:00 Madrid
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Descargar archivos del repo
        uses: actions/checkout@v4

      - name: Enviar snapshot a la IA
        env:
          QUINIAI_ADMIN_KEY: ${{ secrets.QUINIAI_ADMIN_KEY }}
          QUINIAI_BACKEND_URL: ${{ secrets.QUINIAI_BACKEND_URL }}
        run: |
          # Usamos un comando curl básico para enviar tu archivo ya generado al servidor
          curl -X POST "${QUINIAI_BACKEND_URL}/admin/ia-feed" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${QUINIAI_ADMIN_KEY}" \
            -H "x-admin-key: ${QUINIAI_ADMIN_KEY}" \
            -d @cuotas.json
