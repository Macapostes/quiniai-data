name: Update Odds Data
on:
  schedule:
    - cron: '0 0 * * *'  # 02:00 Europe/Madrid (verano CEST=UTC+2) / 01:00 invierno → ajustar a '0 1 * * *' en oct
    - cron: '0 10 * * *' # 12:00 Europe/Madrid (verano CEST=UTC+2) / 11:00 invierno → ajustar a '0 11 * * *' en oct
  workflow_dispatch: # Permite ejecutarlo a mano para probar

# ESTO ES LO QUE SOLUCIONA EL ERROR 128 (Da permiso para subir el archivo)
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python update_odds.py
      - name: Commit and push changes
        run: |
          git config --global user.name 'OddsBot'
          git config --global user.email 'bot@quiniai.com'
          git add cuotas.json
          git commit -m "Actualizar cuotas" || exit 0
          git push
